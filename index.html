<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModdingKingz</title>

  <meta name="description" content="The best mod collection — download the latest mods at ModdingKingz.">
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://moddingkingz.github.io/Modding.Kingz/">
  <meta property="og:title" content="ModdingKingz">
  <meta property="og:description" content="The best mod collection. Download the latest mods now.">
  <meta property="og:image" content="https://moddingkingz.github.io/Modding.Kingz/logo.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="ModdingKingz">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ModdingKingz">
  <meta name="twitter:description" content="The best mod collection. Download the latest mods now.">
  <meta name="twitter:image" content="https://moddingkingz.github.io/Modding.Kingz/logo.png">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #06000e;
      --card: #0f001e;
      --border: #3a0068;
      --border-hover: #8800dd;
      --purple: #9900ff;
      --purple-light: #bb44ff;
      --text: #e2d0ff;
      --text-muted: #7050aa;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 10% 40%, rgba(100, 0, 210, 0.14) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 5%,  rgba(130, 0, 255, 0.09) 0%, transparent 50%),
        radial-gradient(ellipse at 55% 100%, rgba(80, 0, 180, 0.11) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(110, 0, 210, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(110, 0, 210, 0.035) 1px, transparent 1px);
      background-size: 55px 55px;
      pointer-events: none;
      z-index: 0;
    }

    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 66px;
      background: rgba(4, 0, 12, 0.95);
      border-bottom: 1px solid rgba(120, 0, 240, 0.3);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 1000;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      gap: 0.9rem;
    }

    .nav-logo {
      height: 40px;
      width: auto;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px rgba(150, 0, 255, 0.4));
    }

    .nav-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 3px;
      text-shadow: 0 0 12px #9900ff, 0 0 30px #6600aa;
      white-space: nowrap;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 1.5rem 4rem;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--purple);
      letter-spacing: 7px;
      text-transform: uppercase;
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    .hero-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.4rem, 9vw, 5.5rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 3px;
      text-shadow: 0 0 18px #bb00ff, 0 0 45px #8800cc, 0 0 90px #5500aa;
      margin-bottom: 1rem;
      line-height: 1.1;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.25s, titlePulse 4s ease-in-out infinite 1s;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 18px #bb00ff, 0 0 45px #8800cc, 0 0 90px #5500aa; }
      50%       { text-shadow: 0 0 28px #dd00ff, 0 0 65px #aa00ff, 0 0 120px #7700bb; }
    }

    .hero-sub {
      font-size: 0.82rem;
      color: #6a3e99;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.4s;
    }

    .btn-main {
      display: inline-block;
      padding: 0.95rem 3rem;
      background: linear-gradient(135deg, #5200a8, #aa00ff);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 3px;
      text-decoration: none;
      border-radius: 3px;
      text-transform: uppercase;
      box-shadow: 0 0 25px rgba(155, 0, 255, 0.45), inset 0 1px 0 rgba(255,255,255,0.07);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.55s;
    }

    .btn-main::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.13), transparent);
      transition: left 0.45s ease;
    }

    .btn-main:hover::before { left: 100%; }
    .btn-main:hover {
      box-shadow: 0 0 40px rgba(190, 0, 255, 0.85), 0 0 80px rgba(150, 0, 255, 0.35);
      transform: translateY(-3px);
    }

    .stats-bar {
      display: flex;
      gap: 3rem;
      margin-top: 4rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.7s;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--purple-light);
      text-shadow: 0 0 10px rgba(170, 50, 255, 0.4);
      display: block;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .most-viewed {
      position: relative;
      z-index: 1;
      padding: 1rem 1.5rem 6rem;
      text-align: center;
    }

    .section-header {
      margin-bottom: 2.5rem;
    }

    .section-eyebrow {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      color: var(--purple);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 0 0 12px #7700bb;
    }

    .section-line {
      width: 70px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--purple), transparent);
      margin: 0.9rem auto 0;
    }

    .mv-wrap { display: flex; justify-content: center; }

    .mod-card {
      background: linear-gradient(160deg, #130022, #0b0016);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      width: 300px;
      max-width: 100%;
      transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
      position: relative;
    }

    .mod-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 28px rgba(140, 0, 255, 0.3), 0 10px 35px rgba(0,0,0,0.65);
      transform: translateY(-6px);
    }

    .mod-img-wrap {
      width: 100%;
      height: 185px;
      background: linear-gradient(135deg, #160030, #240048);
      overflow: hidden;
      position: relative;
    }

    .mod-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.45s ease;
    }

    .mod-card:hover .mod-img-wrap img { transform: scale(1.07); }

    .mod-body { padding: 1.2rem 1.25rem 1.4rem; }

    .mod-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: #f2e4ff;
      letter-spacing: 0.5px;
      margin-bottom: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mod-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.1rem;
      gap: 0.5rem;
    }

    .mod-version {
      font-size: 0.78rem;
      color: #9966cc;
      background: rgba(100, 0, 180, 0.15);
      border: 1px solid rgba(120, 0, 200, 0.25);
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 55%;
    }

    .mod-downloads {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .btn-download {
      display: block;
      width: 100%;
      padding: 0.7rem;
      background: linear-gradient(135deg, #4a0099, #9900ee);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-align: center;
      text-decoration: none;
      border-radius: 4px;
      text-transform: uppercase;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-download:hover {
      background: linear-gradient(135deg, #6400cc, #cc00ff);
      box-shadow: 0 0 20px rgba(175, 0, 255, 0.6);
    }

    .no-mod {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      color: #4a2888;
      letter-spacing: 2px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .navbar { padding: 0 1.2rem; }
      .nav-title { font-size: 0.95rem; letter-spacing: 2px; }
      .nav-logo { height: 34px; }
      .hero { padding: 90px 1.2rem 3rem; }
      .stats-bar { gap: 2rem; }
      .stat-num { font-size: 1.2rem; }
      .most-viewed { padding: 1rem 1rem 5rem; }
      .mod-card { width: 100%; max-width: 340px; }
      .btn-main { padding: 0.85rem 2.2rem; font-size: 0.72rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <img src="logo.png" alt="ModdingKingz" class="nav-logo">
    <span class="nav-title">ModdingKingz</span>
  </nav>

  <section class="hero">
    <p class="hero-eyebrow">Welcome to</p>
    <h1 class="hero-title">ModdingKingz</h1>
    <p class="hero-sub">Die beste Mod-Sammlung</p>
    <a href="mods.html" class="btn-main">Go to Mods</a>
    <div class="stats-bar" id="stats-bar">
      <div class="stat">
        <span class="stat-num" id="stat-total">—</span>
        <span class="stat-label">Total Mods</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-active">—</span>
        <span class="stat-label">Available</span>
      </div>
    </div>
  </section>

  <section class="most-viewed">
    <div class="section-header">
      <p class="section-eyebrow">Beliebt</p>
      <h2 class="section-title">Most Viewed</h2>
      <div class="section-line"></div>
    </div>
    <div class="mv-wrap" id="mv-card"></div>
  </section>

  <script src="mods-data.js"></script>
  <script>
    // MOST VIEWED — ID hier ändern
    const MOST_VIEWED_ID = 1000003;

    function buildCard(mod) {
      return '<div class="mod-card">'
        + '<div class="mod-img-wrap">'
        +   '<img src="' + mod.image + '" alt="' + mod.name + '" onerror="this.style.display=\'none\'">'
        + '</div>'
        + '<div class="mod-body">'
        +   '<div class="mod-name">' + mod.name + '</div>'
        +   '<div class="mod-meta">'
        +     '<span class="mod-version">v ' + mod.version + '</span>'
        +     '<span class="mod-downloads">' + mod.downloads.toLocaleString('de-DE') + ' DL</span>'
        +   '</div>'
        +   '<a href="' + mod.link + '" target="_blank" rel="noopener noreferrer" class="btn-download">Download</a>'
        + '</div>'
        + '</div>';
    }

    var mod = null;
    for (var i = 0; i < MODS.length; i++) {
      if (MODS[i].id === MOST_VIEWED_ID) { mod = MODS[i]; break; }
    }
    var wrap = document.getElementById('mv-card');
    wrap.innerHTML = mod ? buildCard(mod) : '<p class="no-mod">Keine Mod ausgewählt.</p>';

    var total = MODS.length;
    var active = MODS.filter(function(m) { return m.active; }).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-active').textContent = active;
  </script>
</body>
</html>
